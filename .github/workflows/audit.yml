name: resource-audit
on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1"
permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-resource-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with: {python-version: "3.13"}
      - run: python -m unittest discover -s tests -v
